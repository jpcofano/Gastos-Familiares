<!-- @dsCard group="Mobile (legacy)" viewport="2000x980" name="Share landing — opciones" subtitle="4 direcciones para la pantalla de recepción al compartir un comprobante" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="design_doc_mode" content="canvas" />
<title>Share landing — opciones</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-base); }
  .lbl { font-size: 13px; font-weight: 700; color: #e5e7eb; margin-bottom: 10px; display: flex; align-items: baseline; gap: 8px; }
  .lbl small { font-weight: 500; color: #9ca3af; font-size: 11.5px; }
  .screen {
    width: 412px; height: 760px; border-radius: 30px; overflow: hidden; position: relative;
    background: var(--gf-ink); color: #fff;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);
    display: flex; flex-direction: column;
    background-image: radial-gradient(120% 75% at 50% 0%, var(--gf-ink-soft) 0%, var(--gf-ink) 58%);
  }
</style>
</head>
<body>

<div style="position:absolute; left:40px; top:50px; width:412px;">
  <div class="lbl" data-drags-parent="1">A · Extracción en vivo <small>los datos salen del documento</small></div>
  <div id="v-a" class="screen"></div>
</div>
<div style="position:absolute; left:512px; top:50px; width:412px;">
  <div class="lbl" data-drags-parent="1">B · Monto protagonista <small>cuenta en vivo, sobrio y rápido</small></div>
  <div id="v-b" class="screen"></div>
</div>
<div style="position:absolute; left:984px; top:50px; width:412px;">
  <div class="lbl" data-drags-parent="1">C · Conciliación <small>el momento mágico: matchea tu plan</small></div>
  <div id="v-c" class="screen"></div>
</div>
<div style="position:absolute; left:1456px; top:50px; width:412px;">
  <div class="lbl" data-drags-parent="1">D · Timeline con resultados <small>informativo, cada paso revela algo</small></div>
  <div id="v-d" class="screen"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script type="text/babel">
  // Icon — wrapper seguro alrededor de Lucide (mismo patrón que el kit).
  function Icon({ name, size = 20, color, style }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const host = ref.current;
      if (!host || !window.lucide) return;
      host.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      host.appendChild(el);
      try { window.lucide.createIcons({ attrs: { width: size, height: size } }); } catch (e) {}
      const svg = host.querySelector('svg');
      if (svg) { svg.style.width = size + 'px'; svg.style.height = size + 'px'; }
    }, [name, size]);
    return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size, color: color || 'currentColor', flexShrink: 0, ...style }} />;
  }

  const FILE = { nombre: 'Edenor-factura-junio.pdf', peso: '248 KB' };
  const fmt = (n) => '$' + Math.round(n).toLocaleString('es-AR');

  // useLoop — progreso 0..1 que se repite cada `dur` ms (con pausa al final).
  function useLoop(dur = 5200) {
    const [p, setP] = React.useState(0);
    React.useEffect(() => {
      let raf, start;
      const tick = (t) => {
        if (start == null) start = t;
        const e = ((t - start) % dur) / dur;
        setP(e);
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [dur]);
    return p;
  }

  // TopBar común
  function TopBar({ onlyBrand }) {
    return (
      <div style={{ flex: '0 0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 18px 4px' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 700, color: 'var(--gf-emerald-100)' }}>
          <span style={{ width: 22, height: 22, borderRadius: 6, background: 'var(--color-accent)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 800 }}>GF</span>
          Gastos Familiares
        </span>
        {!onlyBrand && (
          <span style={{ background: 'rgba(255,255,255,.1)', borderRadius: 999, width: 30, height: 30, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#fff' }}>
            <Icon name="x" size={16} />
          </span>
        )}
      </div>
    );
  }

  function Paper({ w = 116, h = 148, scanning }) {
    return (
      <div style={{ position: 'relative', width: w, height: h }}>
        <span style={{ position: 'absolute', inset: '50% auto auto 50%', width: w, height: w, marginLeft: -w/2, marginTop: -w/2, borderRadius: '50%', border: '1.5px solid var(--color-accent)', animation: 'gfRing 2.4s ease-out infinite' }} />
        <div style={{ position: 'relative', width: w, height: h, borderRadius: 12, background: '#fff', overflow: 'hidden', boxShadow: '0 18px 50px rgba(0,0,0,.45)', display: 'flex', flexDirection: 'column', gap: 6, padding: '14px 12px' }}>
          <span style={{ width: 30, height: 30, borderRadius: 8, background: 'var(--gf-emerald-50)', color: 'var(--color-accent)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 3 }}>
            <Icon name="file-text" size={16} />
          </span>
          {[78, 92, 60, 84, 50, 70].map((wd, i) => (
            <span key={i} style={{ height: 6, width: wd + '%', borderRadius: 4, background: i === 0 ? 'var(--gf-gray-200)' : 'var(--gf-gray-100)' }} />
          ))}
          {scanning && <span style={{ position: 'absolute', left: 0, right: 0, height: 26, background: 'linear-gradient(180deg, transparent, rgba(12,143,98,.30) 50%, transparent)', borderTop: '1.5px solid var(--color-accent)', animation: 'gfScan 1.5s ease-in-out infinite' }} />}
        </div>
      </div>
    );
  }

  function FilePill({ light }) {
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, maxWidth: '88%', background: 'rgba(255,255,255,.08)', borderRadius: 999, padding: '7px 14px' }}>
        <Icon name="file-text" size={14} color="var(--gf-emerald-100)" />
        <span style={{ fontSize: 13, fontWeight: 600, color: '#fff', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{FILE.nombre}</span>
        <span style={{ fontSize: 11.5, color: '#9ca3af', flexShrink: 0 }}>· {FILE.peso}</span>
      </div>
    );
  }

  // ── A · Extracción en vivo ──────────────────────────────────────────────
  function VariantA() {
    const p = useLoop(5600);
    const fields = [
      { icon: 'banknote', label: 'Monto',    val: '$38.900',    at: 0.30 },
      { icon: 'store',    label: 'Comercio', val: 'EDENOR S.A.', at: 0.45 },
      { icon: 'calendar', label: 'Vence',    val: '28/06/2026',  at: 0.60 },
    ];
    const scanning = p < 0.7;
    return (
      <React.Fragment>
        <TopBar />
        <div style={{ flex: '0 0 auto', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '14px 24px 0' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.6px', textTransform: 'uppercase', color: 'var(--gf-emerald-100)', marginBottom: 16 }}>Compartido a Gastos</div>
          <Paper scanning={scanning} />
          <div style={{ marginTop: 16 }}><FilePill /></div>
        </div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '8px 26px' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 10 }}>Detectando datos</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
            {fields.map((f, i) => {
              const on = p > f.at;
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, background: 'rgba(255,255,255,.06)', borderRadius: 14, padding: '13px 15px', opacity: on ? 1 : 0, transform: on ? 'none' : 'translateY(10px)', transition: 'opacity .4s, transform .4s' }}>
                  <span style={{ width: 34, height: 34, borderRadius: 9, background: 'rgba(12,143,98,.18)', color: 'var(--gf-emerald-100)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <Icon name={f.icon} size={17} />
                  </span>
                  <span style={{ flex: 1, fontSize: 12, color: '#9ca3af' }}>{f.label}</span>
                  <span style={{ fontSize: 15.5, fontWeight: 700, color: '#fff', fontVariantNumeric: 'tabular-nums' }}>{on ? f.val : '···'}</span>
                  {on && <Icon name="check" size={16} color="var(--gf-emerald-100)" />}
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ flexShrink: 0, padding: '0 26px 26px' }}>
          <div style={{ height: 4, borderRadius: 999, background: 'rgba(255,255,255,.1)', overflow: 'hidden', marginBottom: 12 }}>
            <div style={{ height: '100%', width: Math.min(100, p * 130) + '%', background: 'var(--color-accent)', borderRadius: 999 }} />
          </div>
          <div style={{ fontSize: 13, color: '#9ca3af', textAlign: 'center' }}>{p > 0.7 ? 'Listo — abriendo para confirmar' : 'Leyendo el comprobante…'}</div>
        </div>
      </React.Fragment>
    );
  }

  // ── B · Monto protagonista ──────────────────────────────────────────────
  function VariantB() {
    const p = useLoop(5000);
    const target = 38900;
    const k = Math.min(1, p / 0.55);
    const val = k * target;
    const done = p > 0.62;
    return (
      <React.Fragment>
        <TopBar />
        <div style={{ flex: '0 0 auto', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '20px 24px 0' }}>
          <Paper w={86} h={108} scanning={!done} />
          <div style={{ marginTop: 14 }}><FilePill /></div>
        </div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '0 24px' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.6px', textTransform: 'uppercase', color: 'var(--gf-emerald-100)', marginBottom: 14 }}>{done ? 'Comprobante detectado' : 'Leyendo importe'}</div>
          <div style={{ fontSize: 56, fontWeight: 800, letterSpacing: '-2px', lineHeight: 1, fontVariantNumeric: 'tabular-nums', color: '#fff' }}>{fmt(val)}</div>
          <div style={{ height: 22, marginTop: 14, opacity: done ? 1 : 0, transition: 'opacity .4s' }}>
            <span style={{ fontSize: 17, color: '#e5e7eb', fontWeight: 600 }}>EDENOR S.A.</span>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 16, opacity: done ? 1 : 0, transform: done ? 'none' : 'translateY(8px)', transition: 'all .4s .1s' }}>
            {['Servicios', 'Vence 28/06', 'ARS'].map((t) => (
              <span key={t} style={{ borderRadius: 8, padding: '6px 12px', fontSize: 12.5, fontWeight: 600, background: 'rgba(255,255,255,.1)', color: '#e5e7eb' }}>{t}</span>
            ))}
          </div>
        </div>
        <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9, padding: '0 26px 30px', fontSize: 13, color: '#9ca3af' }}>
          {!done && <span style={{ width: 14, height: 14, border: '2px solid rgba(255,255,255,.25)', borderTopColor: 'var(--gf-emerald-100)', borderRadius: '50%', animation: 'gfSpin .7s linear infinite' }} />}
          {done ? 'Deslizá para confirmar' : 'Extrayendo datos…'}
        </div>
      </React.Fragment>
    );
  }

  // ── C · Conciliación (el match) ─────────────────────────────────────────
  function VariantC() {
    const p = useLoop(5800);
    const esperados = [
      { n: 'Metrogas — gas', m: '$12.400' },
      { n: 'Edenor — luz', m: '$38.900', match: true },
      { n: 'Expensas', m: '$95.000' },
    ];
    const matched = p > 0.55;
    return (
      <React.Fragment>
        <TopBar />
        <div style={{ flex: '0 0 auto', padding: '12px 24px 0', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          {/* mini detectado */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: 'rgba(255,255,255,.07)', borderRadius: 16, padding: '12px 16px', width: '100%' }}>
            <span style={{ width: 38, height: 38, borderRadius: 10, background: 'var(--gf-emerald-50)', color: 'var(--color-accent)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="file-text" size={19} />
            </span>
            <span style={{ flex: 1, minWidth: 0 }}>
              <span style={{ display: 'block', fontSize: 12, color: '#9ca3af' }}>EDENOR S.A.</span>
              <span style={{ display: 'block', fontSize: 20, fontWeight: 800, color: '#fff', fontVariantNumeric: 'tabular-nums' }}>$38.900</span>
            </span>
          </div>
        </div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '4px 24px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 14 }}>
            {!matched && <span style={{ width: 15, height: 15, border: '2px solid rgba(255,255,255,.25)', borderTopColor: 'var(--gf-emerald-100)', borderRadius: '50%', animation: 'gfSpin .7s linear infinite' }} />}
            <span style={{ fontSize: 13.5, fontWeight: 600, color: matched ? 'var(--gf-emerald-100)' : '#e5e7eb' }}>
              {matched ? 'Coincidencia encontrada' : 'Conciliando con tus pagos esperados…'}
            </span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {esperados.map((e, i) => {
              const hit = matched && e.match;
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, borderRadius: 14, padding: '14px 15px',
                  background: hit ? 'rgba(12,143,98,.22)' : 'rgba(255,255,255,.05)',
                  border: hit ? '1.5px solid var(--gf-emerald-line)' : '1.5px solid transparent',
                  opacity: matched && !e.match ? 0.4 : 1, transition: 'all .45s' }}>
                  <span style={{ width: 30, height: 30, borderRadius: '50%', flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: hit ? 'var(--color-accent)' : 'rgba(255,255,255,.08)', color: hit ? '#fff' : '#9ca3af' }}>
                    {hit ? <Icon name="check" size={16} /> : <Icon name="receipt" size={15} />}
                  </span>
                  <span style={{ flex: 1, fontSize: 14.5, fontWeight: hit ? 700 : 500, color: '#fff' }}>{e.n}</span>
                  <span style={{ fontSize: 13.5, color: '#9ca3af', fontVariantNumeric: 'tabular-nums' }}>{e.m}</span>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: 16, padding: '13px 15px', borderRadius: 14, background: matched ? 'rgba(12,143,98,.14)' : 'transparent', display: 'flex', alignItems: 'center', gap: 10, opacity: matched ? 1 : 0, transition: 'opacity .4s .2s' }}>
            <Icon name="sparkles" size={17} color="var(--gf-emerald-100)" />
            <span style={{ fontSize: 13, color: '#d1fae5', lineHeight: 1.35 }}>Lo imputamos a <strong style={{ color: '#fff' }}>Edenor — luz</strong> de Junio.</span>
          </div>
        </div>
        <div style={{ flexShrink: 0, padding: '0 26px 28px', fontSize: 13, color: '#9ca3af', textAlign: 'center' }}>
          {matched ? 'Revisá y confirmá' : 'Un momento…'}
        </div>
      </React.Fragment>
    );
  }

  // ── D · Timeline con resultados ─────────────────────────────────────────
  function VariantD() {
    const p = useLoop(6000);
    const steps = [
      { icon: 'inbox',        t: 'Recibido',    r: FILE.nombre,        at: 0.05 },
      { icon: 'scan-line',    t: 'Leído',       r: '2 páginas · PDF',  at: 0.28 },
      { icon: 'banknote',     t: 'Extraído',    r: '$38.900 · EDENOR', at: 0.50 },
      { icon: 'git-compare',  t: 'Conciliado',  r: 'Edenor — luz · Jun', at: 0.72, ok: true },
    ];
    return (
      <React.Fragment>
        <TopBar />
        <div style={{ flex: '0 0 auto', padding: '14px 26px 6px' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.6px', textTransform: 'uppercase', color: 'var(--gf-emerald-100)', marginBottom: 6 }}>Procesando comprobante</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#fff' }}>Casi listo…</div>
        </div>
        <div style={{ flex: 1, padding: '18px 26px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div style={{ position: 'relative' }}>
            {/* línea vertical */}
            <span style={{ position: 'absolute', left: 17, top: 14, bottom: 14, width: 2, background: 'rgba(255,255,255,.1)' }} />
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {steps.map((s, i) => {
                const on = p > s.at;
                const active = on && p < (steps[i + 1] ? steps[i + 1].at : 0.92);
                return (
                  <div key={i} style={{ display: 'flex', gap: 16, alignItems: 'flex-start', padding: '11px 0', position: 'relative', opacity: on ? 1 : 0.35, transition: 'opacity .4s' }}>
                    <span style={{ position: 'relative', zIndex: 1, width: 36, height: 36, borderRadius: '50%', flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                      background: on ? (s.ok ? 'var(--color-accent)' : 'var(--gf-ink-soft)') : 'var(--gf-ink-soft)',
                      border: active ? '2px solid var(--gf-emerald-line)' : '2px solid transparent',
                      color: on ? (s.ok ? '#fff' : 'var(--gf-emerald-100)') : '#6b7280', boxShadow: '0 0 0 4px var(--gf-ink)' }}>
                      <Icon name={s.icon} size={17} />
                    </span>
                    <span style={{ flex: 1, paddingTop: 1 }}>
                      <span style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 14.5, fontWeight: 700, color: '#fff' }}>
                        {s.t}
                        {on && <Icon name="check" size={14} color={s.ok ? 'var(--gf-emerald-100)' : '#6b7280'} />}
                      </span>
                      <span style={{ display: 'block', fontSize: 12.5, color: '#9ca3af', marginTop: 3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 240, opacity: on ? 1 : 0, transition: 'opacity .4s .1s' }}>{s.r}</span>
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div style={{ flexShrink: 0, padding: '0 26px 28px', fontSize: 13, color: '#9ca3af', textAlign: 'center' }}>
          {p > 0.78 ? 'Listo — tocá para revisar' : 'No cierres la app…'}
        </div>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('v-a')).render(<VariantA />);
  ReactDOM.createRoot(document.getElementById('v-b')).render(<VariantB />);
  ReactDOM.createRoot(document.getElementById('v-c')).render(<VariantC />);
  ReactDOM.createRoot(document.getElementById('v-d')).render(<VariantD />);
</script>
</body>
</html>
